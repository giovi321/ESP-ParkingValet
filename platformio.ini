; ESP-ParkingValet - parking occupancy monitor on ESP32-CAM (OV5640 v1.2 module, plain ESP32 + PSRAM)
; Custom OV5640 board: pin map reused from giovi321/ESP32-cam-OV5640 ESPHome config.
;
; Web stack note: we deliberately use the *built-in* synchronous WebServer + DNSServer
; (bundled in the Arduino-ESP32 core) plus light polling for live values, instead of
; ESPAsyncWebServer/WebSocket. This removes the only fragile external deps, avoids a
; camera-buffer mutex (everything runs in one loop), and is plenty responsive for a
; single admin tuning the device. ArduinoJson is the only third-party library.

[platformio]
default_envs = esp32cam

[env:esp32cam]
platform = espressif32@6.9.0      ; Arduino-ESP32 core 2.0.17 (ships esp32-camera + img_converters)
board = esp32dev
framework = arduino

board_build.partitions = min_spiffs.csv   ; OTA-capable: 2x ~1.9MB app slots + small FS (needs >=4MB flash)
board_build.flash_mode = dio

; Regenerate src/web_ui.h from web-src/index.html before every build.
extra_scripts = pre:tools/pio_prebuild.py

monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time
upload_speed = 921600

build_flags =
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=3
    -DPARKINGCAM_VERSION=\"1.0.0\"
    -DMQTT_MAX_PACKET_SIZE=2048

lib_deps =
    bblanchon/ArduinoJson@^7.4.1
    https://github.com/0015/ESP32-OV5640-AF.git   ; OV5640 autofocus firmware + SCCB commands
    knolleary/PubSubClient@^2.8                   ; MQTT client (native, optional mqtts via WiFiClientSecure)
